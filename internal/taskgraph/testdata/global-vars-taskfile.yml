version: '3'

vars:
  PACKAGE: github.com/example/project
  VERSION:
    sh: git describe --tags
  OUTPUT_DIR: ./build

tasks:
  build:
    desc: Build the project
    cmds:
      - go build -ldflags "{{.PACKAGE}}" -o {{.OUTPUT_DIR}}/app

  test:
    desc: Run tests
    cmds:
      - go test ./...

  release:
    desc: Create a release
    deps: [build, test]
    cmds:
      - echo "Releasing {{.VERSION}}"
